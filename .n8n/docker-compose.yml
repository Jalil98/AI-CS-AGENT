version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=https://conciliarly-nonreversing-jammie.ngrok-free.dev
      - N8N_HOST=conciliarly-nonreversing-jammie.ngrok-free.dev
      - N8N_PROTOCOL=https
    volumes:
      - ./n8n_data:/home/node/.n8n